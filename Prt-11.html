```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML5 API Demo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f4f6f9;
  }
  h1 { color: #333; }

  .box {
    width: 120px;
    height: 120px;
    margin: 10px auto;
    line-height: 120px;
    border-radius: 10px;
    font-weight: bold;
  }

  #drag {
    background: #4CAF50;
    color: white;
    cursor: grab;
  }

  #drop {
    background: #ddd;
    border: 2px dashed #555;
  }

  button {
    padding: 8px 15px;
    margin: 5px;
    border: none;
    background: #2196F3;
    color: white;
    border-radius: 5px;
    cursor: pointer;
  }

  input {
    padding: 8px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h1>HTML5 APIs Demo</h1>

<!-- Drag & Drop -->
<h3>Drag & Drop</h3>
<div id="drag" class="box" draggable="true">Drag</div>
<div id="drop" class="box">Drop</div>

<!-- Geolocation -->
<h3>Geolocation</h3>
<button onclick="getLocation()">Get Location</button>
<p id="loc"></p>

<!-- Web Storage -->
<h3>Web Storage</h3>
<input type="text" id="name" placeholder="Enter name">
<br>
<button onclick="save()">Save</button>
<button onclick="load()">Load</button>
<p id="output"></p>

<script>
// Drag & Drop
let drag = document.getElementById("drag");
let drop = document.getElementById("drop");

drag.ondragstart = (e) => {
  e.dataTransfer.setData("id", e.target.id);
};

drop.ondragover = (e) => e.preventDefault();

drop.ondrop = (e) => {
  e.preventDefault();
  let data = e.dataTransfer.getData("id");
  drop.appendChild(document.getElementById(data));
};

// Geolocation
function getLocation() {
  let x = document.getElementById("loc");
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      x.innerHTML = `Lat: ${pos.coords.latitude} <br> Lon: ${pos.coords.longitude}`;
    }, () => {
      x.innerHTML = "Location access denied!";
    });
  } else {
    x.innerHTML = "Not supported!";
  }
}

// Web Storage
function save() {
  let name = document.getElementById("name").value;
  localStorage.setItem("username", name);
}

function load() {
  let data = localStorage.getItem("username");
  document.getElementById("output").innerHTML =
    data ? "Saved: " + data : "No data found";
}
</script>

</body>
</html>
